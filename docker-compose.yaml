# Example docker-compose for running lazymc-docker-proxy on a Raspberry Pi.
#
# The proxy runs on the Pi and controls a separate PC (the Minecraft server host)
# via GPIO relay (power button) and SSH.
#
# Requirements on the Pi:
#   - GPIO relay wired to the PC's motherboard power-button header
#   - SSH key pair set up: Pi can SSH into the PC without a password
#   - (optional) Wake-on-LAN enabled in the PC BIOS
#
# Requirements on the PC:
#   - SSH server running and accessible from the Pi
#   - `sudo shutdown -h now` allowed without a password for the SSH user, OR
#     configure sudoers: `ubuntu ALL=(ALL) NOPASSWD: /sbin/shutdown`
#   - Minecraft server running via Docker / systemd / auto-start on boot

services:
  lazymc:
    image: ghcr.io/tspry/lazymc-docker-proxy:latest
    restart: unless-stopped

    # --- GPIO access (Raspberry Pi only) ---
    # Uncomment the devices and privileged sections to allow GPIO control.
    # devices:
    #   - /dev/gpiomem:/dev/gpiomem
    # privileged: true   # only needed if /dev/gpiomem alone is not enough

    volumes:
      # Mount your SSH private key so the container can reach the PC
      - ~/.ssh/id_rsa:/keys/id_rsa:ro

    ports:
      # Expose the Minecraft port that players connect to on the Pi
      - "25565:25565"

    environment:
      RUST_LOG: "info"

      # ---- Minecraft server address (on the remote PC) ----
      SERVER_ADDRESS: "192.168.1.100:25565"   # change to your PC's IP

      # ---- Remote PC SSH connection ----
      MACHINE_HOST: "192.168.1.100"           # PC IP or hostname
      MACHINE_SSH_USER: "ubuntu"              # SSH user on the PC
      MACHINE_SSH_KEY_PATH: "/keys/id_rsa"   # path inside the container

      # ---- (Optional) Wake-on-LAN ----
      # MACHINE_WOL_MAC: "AA:BB:CC:DD:EE:FF"

      # ---- GPIO relay (BCM pin number) ----
      GPIO_PIN: "18"          # BCM pin wired to relay → PC power button
      GPIO_PULSE_MS: "500"    # relay pulse duration in milliseconds

      # ---- How Minecraft is managed on the PC ----
      # docker   → SSH and run `docker start/stop <MC_DOCKER_CONTAINER>`
      # systemd  → SSH and run `systemctl start/stop <MC_SYSTEMD_SERVICE>`
      # boot     → Minecraft auto-starts on PC boot; only shutdown is needed
      MC_MANAGEMENT: "docker"
      MC_DOCKER_CONTAINER: "minecraft"
      # MC_SYSTEMD_SERVICE: "minecraft.service"

      # ---- lazymc group / server identity ----
      LAZYMC_GROUP: "mc"

      # ---- Sleep / wake timing ----
      TIME_SLEEP_AFTER: "600"         # sleep after 10 min of no players
      TIME_MINIMUM_ONLINE_TIME: "60"  # stay online at least 60 s after start

      # ---- MOTD shown in the server browser while sleeping / starting ----
      MOTD_SLEEPING: "Server is sleeping \U0001F634"
      MOTD_STARTING: "Server is starting, please wait..."
